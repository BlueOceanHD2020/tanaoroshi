const fmt = (n) => n != null ? n.toLocaleString("ja-JP") : "—";

// ─── Price Master API ───
async function loadPriceMaster() {
  try {
    const res = await fetch(GAS_URL + '?action=getPriceMaster');
    const json = await res.json();
    if (json.status === 'ok') {
      return json.data;
    }
  } catch(e) { console.error('単価マスター取得エラー:', e); }
  return null;
}

function getSuppliersForStore(storeName, priceMaster) {
  if (!priceMaster || !storeName) return SUPPLIERS;
  const result = {};
  for (const key of Object.keys(SUPPLIERS)) {
    result[key] = SUPPLIERS[key];
  }
  const masterBySupplier = {};
  for (const row of priceMaster) {
    if (row.store !== storeName) continue;
    if (!masterBySupplier[row.supplier]) masterBySupplier[row.supplier] = [];
    masterBySupplier[row.supplier].push({ name: row.name, unit: row.unit, price: row.price });
  }
  for (const [supplier, items] of Object.entries(masterBySupplier)) {
    result[supplier] = items;
  }
  return result;
}

function getActiveSuppliers() {
  return getSuppliersForStore(state.store, state.priceMaster);
}

function getActiveSupplierList() {
  return Object.keys(getActiveSuppliers());
}

// ─── App State ───

let state = {
  screen: isAuthed ? "store" : "auth",
  store: null,
  supplier: null,
  inventory: {},
  customItems: {},  // 取引先 → [{name, unit, price, qty}, ...]
  completedSuppliers: {},
  searchQuery: "",
  submitting: false,
  submitError: null,
  authError: null,
  priceMaster: null,
  masterLoading: false,
};

function authenticate() {
  const input = document.getElementById('auth-input');
  const v = input ? input.value : '';
  if (v === PASSCODE) {
    sessionStorage.setItem('tanaoroshi_auth', '1');
    setState({ screen: "store", authError: null });
  } else {
    setState({ authError: "パスコードが違います" });
  }
}

async function handleStoreSelect(storeName) {
  state.store = storeName;
  state.screen = 'supplier';
  state.masterLoading = true;
  state.priceMaster = null;
  // inventory/customItemsを初期化（まだフォールバックのSUPPLIERS基準）
  SUPPLIER_LIST.forEach(s => { state.inventory[s] = {}; state.customItems[s] = []; });
  render();
  const master = await loadPriceMaster();
  state.priceMaster = master;
  state.masterLoading = false;
  // マスター取得後、activeSupplierListで再初期化
  const activeList = getActiveSupplierList();
  const init = {};
  const initCustom = {};
  activeList.forEach(s => { init[s] = {}; initCustom[s] = []; });
  state.inventory = init;
  state.customItems = initCustom;
  render();
}

// Initialize inventory
SUPPLIER_LIST.forEach(s => { state.inventory[s] = {}; state.customItems[s] = []; });

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function getSupplierTotal(supplierName) {
  const items = getActiveSuppliers()[supplierName] || [];
  const inv = state.inventory[supplierName] || {};
  let total = 0;
  items.forEach((item, i) => {
    const qty = inv[i];
    if (qty != null && qty !== "") total += parseFloat(qty) * item.price;
  });
  // 自由入力品目も合算
  (state.customItems[supplierName] || []).forEach(ci => {
    const p = parseFloat(ci.price), q = parseFloat(ci.qty);
    if (!isNaN(p) && !isNaN(q)) total += p * q;
  });
  return total;
}

function addCustomItem(supplier) {
  if (!state.customItems[supplier]) state.customItems[supplier] = [];
  state.customItems[supplier].push({ name: "", unit: "個", price: "", qty: "" });
  render();
}

function removeCustomItem(supplier, idx) {
  if (state.customItems[supplier]) {
    state.customItems[supplier].splice(idx, 1);
    render();
  }
}

function updateCustomItem(supplier, idx, field, value) {
  if (state.customItems[supplier] && state.customItems[supplier][idx]) {
    state.customItems[supplier][idx][field] = value;
    // 軽量レンダー: 合計だけ更新したいが簡略化のため再描画
    render();
  }
}

function getGrandTotal() {
  let total = 0;
  getActiveSupplierList().forEach(s => { total += getSupplierTotal(s); });
  return total;
}

function getFilledCount(supplierName) {
  const inv = state.inventory[supplierName] || {};
  return Object.values(inv).filter(v => v != null && v !== "" && v !== 0 && v !== "0").length;
}

function handleQuantityChange(supplierName, itemIndex, value) {
  state.inventory[supplierName][itemIndex] = value === "" ? "" : value;
  render();
}

// ─── Submit to Google Sheets ───
async function submitToSheet() {
  setState({ submitting: true, submitError: null });
  try {
    const items = [];
    getActiveSupplierList().forEach(supplierName => {
      const supplierItems = getActiveSuppliers()[supplierName] || [];
      const inv = state.inventory[supplierName] || {};
      supplierItems.forEach((item, i) => {
        const qty = inv[i];
        if (qty != null && qty !== "" && parseFloat(qty) > 0) {
          items.push({
            supplier: supplierName,
            name: item.name,
            unit: item.unit,
            price: item.price,
            quantity: parseFloat(qty),
            amount: Math.round(parseFloat(qty) * item.price),
          });
        }
      });
      // 自由入力品目
      (state.customItems[supplierName] || []).forEach(ci => {
        const name = (ci.name || "").trim();
        const price = parseFloat(ci.price);
        const qty = parseFloat(ci.qty);
        if (name && !isNaN(price) && !isNaN(qty) && qty > 0) {
          items.push({
            supplier: supplierName,
            name: "【自由入力】" + name,
            unit: ci.unit || "個",
            price: price,
            quantity: qty,
            amount: Math.round(price * qty),
          });
        }
      });
    });

    if (items.length === 0) {
      setState({ submitError: "在庫数量が1件も入力されていません", submitting: false });
      return;
    }

    const payload = JSON.stringify({ store: state.store, items: items });
    const sentAt = Date.now();

    // GAS Web App は POST 時に 302 を返すため no-cors で送信。レスポンスは opaque で読めない。
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: payload,
    });

    // 3秒待ってから doGet で確認APIを叩き、入力ログの最新送信時刻と照合して成功判定
    await new Promise(r => setTimeout(r, 3000));

    const checkUrl = GAS_URL + "?check=1&store=" + encodeURIComponent(state.store);
    const checkRes = await fetch(checkUrl, { method: "GET" });
    const checkData = await checkRes.json();

    if (checkData && checkData.lastSentAt) {
      const lastSentMs = new Date(checkData.lastSentAt).getTime();
      // 送信開始時刻以降のログがあれば成功
      if (lastSentMs >= sentAt - 1000) {
        setState({ screen: "done", submitting: false });
        return;
      }
    }
    setState({ submitError: "送信確認エラー: ログに記録が見つかりません", submitting: false });
  } catch (err) {
    setState({ submitError: "通信エラー: " + err.message, submitting: false });
  }
}

function generateCSV() {
  let csv = "店舗名,取引先,品目,単位,仕入単価,在庫数量,金額\n";
  getActiveSupplierList().forEach(s => {
    const items = getActiveSuppliers()[s] || [];
    const inv = state.inventory[s] || {};
    items.forEach((item, i) => {
      const qty = inv[i];
      if (qty != null && qty !== "") {
        const amount = parseFloat(qty) * item.price;
        csv += `"${state.store}","${s}","${item.name}","${item.unit}",${item.price},${qty},${amount}\n`;
      }
    });
  });
  return csv;
}

function downloadCSV() {
  const csv = "\uFEFF" + generateCSV();
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `棚卸_${state.store}_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  const init = {};
  const initCustom = {};
  SUPPLIER_LIST.forEach(s => { init[s] = {}; initCustom[s] = []; });
  setState({
    screen: "store", store: null, supplier: null,
    inventory: init, customItems: initCustom, completedSuppliers: {},
    searchQuery: "", submitting: false, submitError: null,
    priceMaster: null, masterLoading: false,
  });
}
